<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>flashcards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>flashcards</h1>
  </header>

  <main>
    <section class="decks-pane">
      <div class="row">
        <h2>decks</h2>
        <span id="dueTotal" class="due-pill">0 due</span>
      </div>

      <ul id="deckList" class="deck-list"></ul>

      <form id="newDeckForm" class="inline-form">
        <input id="newDeckName" type="text" placeholder="new deck name" maxlength="60" required>
        <button type="submit">add deck</button>
      </form>
    </section>

    <section id="deckView" class="deck-view hidden">
      <div class="row">
        <h2 id="currentDeckName"></h2>
        <div>
          <button id="studyBtn" type="button">study</button>
          <button id="deleteDeckBtn" class="danger" type="button">delete deck</button>
        </div>
      </div>

      <form id="newCardForm" class="card-form">
        <label>
          <span>front</span>
          <textarea id="cardFront" rows="2" required></textarea>
        </label>
        <label>
          <span>back</span>
          <textarea id="cardBack" rows="2" required></textarea>
        </label>
        <button type="submit">add card</button>
      </form>

      <h3>cards in deck</h3>
      <table class="cards-table">
        <thead>
          <tr>
            <th>front</th>
            <th>back</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cardsTbody"></tbody>
      </table>
    </section>

    <section id="studyView" class="study-view hidden">
      <div class="row">
        <h2 id="studyDeckName"></h2>
        <button id="exitStudy" type="button">back to deck</button>
      </div>

      <div id="studyEmpty" class="study-empty hidden">
        <p>nothing due in this deck right now.</p>
      </div>

      <div id="studyCard" class="study-card hidden">
        <div id="cardFace" class="face">click the card to flip</div>
        <div class="grade-row hidden" id="gradeRow">
          <button data-q="0" class="grade again">again</button>
          <button data-q="3" class="grade hard">hard</button>
          <button data-q="4" class="grade good">good</button>
          <button data-q="5" class="grade easy">easy</button>
        </div>
      </div>
    </section>
  </main>

  <script src="sm2.js"></script>
  <script src="app.js"></script>
</body>
</html>
